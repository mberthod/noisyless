events {
    worker_connections 1024;
}

http {
    # HTTP redirect for both domains
    server {
        listen 80;
        server_name noisyless.com www.noisyless.com;
        return 301 https://noisyless.com$request_uri;
    }

    server {
        listen 80;
        server_name platform.noisyless.com;
        return 301 https://platform.noisyless.com$request_uri;
    }

    # noisyless.com - Product site (index.html)
    server {
        listen 443 ssl;
        server_name noisyless.com www.noisyless.com;

        ssl_certificate /etc/nginx/ssl/platform.noisyless.com.crt;
        ssl_certificate_key /etc/nginx/ssl/platform.noisyless.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Root serves index.html (product site)
        location = / {
            root /var/www/static;
            try_files /index.html =404;
        }

        # Static pages
        location ~ ^/(faq|cgv|confidentialite|mentions-legales|boutique|pilote|merci|annule)\.html$ {
            root /var/www/static;
        }

        # New folders: produits, cas-usage, comparatif, technologie
        location /produits/ {
            root /var/www/static;
            try_files $uri $uri/ =404;
        }

        location /cas-usage/ {
            root /var/www/static;
            try_files $uri $uri/ =404;
        }

        location /comparatif/ {
            root /var/www/static;
            try_files $uri $uri/ =404;
        }

        location /technologie/ {
            root /var/www/static;
            try_files $uri $uri/ =404;
        }

        # Blog
        location /blog/ {
            root /var/www/static;
            try_files $uri $uri/ /blog/index.html =404;
        }

        # Assets
        location /assets/ {
            alias /var/www/static/assets/;
        }

        # Firmware
        location /firmware/ {
            root /var/www/static;
        }

        # Catch-all for other static files
        location / {
            root /var/www/static;
            try_files $uri $uri/ =404;
        }
    }

    # platform.noisyless.com - Dashboard (platform.html)
    server {
        listen 443 ssl;
        server_name platform.noisyless.com;

        ssl_certificate /etc/nginx/ssl/platform.noisyless.com.crt;
        ssl_certificate_key /etc/nginx/ssl/platform.noisyless.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Root serves platform.html (dashboard)
        location = / {
            root /var/www/static;
            try_files /platform.html =404;
        }

        location /platform.html {
            root /var/www/static;
        }

        # Admin static
        location = /admin.html {
            root /var/www/static;
        }

        # Admin API
        location /admin/ {
            proxy_pass http://172.18.0.2:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API
        location /api/ {
            proxy_pass http://172.18.0.2:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Assets
        location /assets/ {
            alias /var/www/static/assets/;
        }

        # Firmware
        location /firmware/ {
            root /var/www/static;
        }
    }
}
