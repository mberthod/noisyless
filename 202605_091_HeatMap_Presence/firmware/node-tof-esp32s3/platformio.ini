; PlatformIO Project Configuration for NOISYLESS HeatMap — Node ToF
; Target: ESP32-S3-MINI-1
; Framework: ESP-IDF (not Arduino — bare metal control)

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.flash_mode = qio
board_build.f_cpu = 240000000L

; Deep sleep + RTC wake support
board_build.partitions = partitions.csv

build_flags =
    -D CONFIG_FREERTOS_HZ=1000
    -D CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240=y
    -D CONFIG_ESP_MAIN_TASK_STACK_SIZE=8192
    -D CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=10
    -D CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=32
    -D CONFIG_PM_ENABLE=1
    -D CONFIG_FREERTOS_USE_TICKLESS_IDLE=1

lib_deps =
    ; No external deps — everything is ESP-IDF native or handwritten

; Flash: 8MB, partition scheme with OTA support
board_upload.flash_size = 8MB
