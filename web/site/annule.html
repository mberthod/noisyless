<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement annulé | NOISYLESS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #FFFFFF; --bg-alt: #F5F5F3; --ink: #1A1A1A; --ink-light: #5A5A5A;
            --border: #E0E0E0; --signal: #FF6B00; --signal-dim: #FF6B0020;
            --font-display: 'Space Mono', monospace; --font-body: 'IBM Plex Sans', sans-serif;
        }
        body { font-family: var(--font-body); background: var(--bg); color: var(--ink); line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; padding: 0 24px; }
        header { border-bottom: 1px solid var(--border); padding: 20px 0; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo img { height: 32px; width: auto; }
        nav a { color: var(--ink); text-decoration: none; font-family: var(--font-display); font-size: 0.875rem; margin-left: 24px; }
        
        .hero { padding: 80px 0; text-align: center; }
        .hero-icon { font-size: 4rem; margin-bottom: 24px; color: var(--ink-light); }
        .hero h1 { font-family: var(--font-display); font-size: 2rem; margin-bottom: 16px; }
        .hero p { color: var(--ink-light); margin-bottom: 32px; }
        .btn { display: inline-block; padding: 14px 28px; font-family: var(--font-display); font-weight: 700; text-decoration: none; border: 1px solid var(--ink); transition: all 0.2s; }
        .btn-primary { background: var(--ink); color: var(--bg); }
        .btn-primary:hover { background: var(--signal); border-color: var(--signal); }
        .btn-secondary { background: transparent; color: var(--ink); margin-right: 16px; }
        .btn-secondary:hover { background: var(--bg-alt); }
        
        footer { padding: 40px 0; border-top: 1px solid var(--border); text-align: center; font-size: 0.875rem; color: var(--ink-light); }
        footer a { color: var(--ink-light); margin: 0 8px; }
    </style>
</head>
<body>
    <header>
        <div class="container header-inner">
            <a href="/" class="logo">
                <img src="/assets/logohorizmonochrome.png" alt="NOISYLESS">
            </a>
            <nav>
                <a href="/">Accueil</a>
                <a href="/produits/noisyless-simple.html">Produits</a>
                <a href="/faq.html">FAQ</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <div class="hero-icon">✕</div>
            <h1>Paiement annulé</h1>
            <p>Vous avez annulé votre paiement. Aucun prélèvement n'a été effectué.</p>
            <div style="margin-top: 32px;">
                <a href="/produits/noisyless-simple.html#commander" class="btn btn-secondary">Retour boutique</a>
                <a href="/faq.html" class="btn btn-primary">Une question ?</a>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 NOISYLESS — ELEC-CORE / MBHREP</p>
            <p style="margin-top: 8px;">
                <a href="/mentions-legales.html">Mentions légales</a>
                <a href="/confidentialite.html">Confidentialité</a>
                <a href="/cgv.html">CGV</a>
            </p>
        </div>
    </footer>
</body>
</html>
