; PlatformIO Project Configuration - NOISYLESS v0.0.1
;
; ESP32-S3-MINI-1 (N8, sans PSRAM)
; Monolithique : WiFiManager + BME680/BSEC2 + LD2410 + Analog
; 
; ====== OTA CHECK CRITIQUE - NE PAS SUPPRIMER ======
;
; Ce firmware inclut un mécanisme OTA (Over-The-Air) pour la mise à jour
; automatique. Ce code est ESSENTIEL pour le fonctionnement.
;
; NE SUPPRIMEZ JAMAIS :
;   - g_otaMutex et g_otaRunning (variables OTA)
;   - OTA_CHECK_INTERVAL_MS = 120000UL (intervalle 2min)
;   - checkOtaManifestAndUpdate() appelée au boot et en boucle
;   - Timeout 90s pour éviter bloquer trop longtemps
;
; FLASHING SANS NVS ERASE :
;   platformio run --target upload    ← FLASH SANS EFFACER LE NVS
;   platformio run --target erase     ← EFFACE TOUT LE FIRMWARE
;   platformio run --target clean     ← EFFACE LE BUILD
;
; POUR NE PAS EFFACER LE NVS DANS PLATFORMIO.INI :
;   build_flags = -D OTA_CHECK_INTERVAL_MS=120000UL
;
; VERSION ACTUELLE : 0.0.10

[env:esp32dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Hardware S3-MINI-1
board_build.flash_size = 8MB
board_build.psram_type = disabled
board_build.flash_mode = dio
board_build.flash_freq = 40m
board_build.partitions = custom_partitions.csv

; USB CDC (série sur port USB)
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1

; Librairies
lib_deps =
	knolleary/PubSubClient@^2.8.0
	ncmreynolds/ld2410@^0.1.4
	boschsensortec/bsec2@^1.10.2610
	boschsensortec/BME68x Sensor library@^1.3.40408
	tzapu/WiFiManager@^2.0.17
