; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html



[env:esp32dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Taille flash pour le partitionnement (SPIFS + OTA) utilisé
board_build.flash_size = 8MB

;board_build.mcu = esp32s3
;board_build.f_cpu = 240000000L
;board_build.flash_mode = qio
;board_build.flash_freq = 80m
board_build.partitions = custom_partitions.csv
;src_filter = +<src/> -<src/App.cpp> -<src/factory_firmware.cpp> -<src/CmdManager.cpp> -<src/Console.cpp> -<src/led_status.cpp> -<src/OTAService.cpp> -<src/setting.cpp>

; Activation de l'USB CDC et MSC au démarrage (USB série + clé USB)
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D ARDUINO_USB_MSC_ON_BOOT=1
	
; Librairies utilisées
lib_deps =
  tzapu/WiFiManager@^2.0.17
  links2004/WebSockets@^2.7.0
	ncmreynolds/ld2410@^0.1.4
  knolleary/PubSubClient@^2.8.0
  boschsensortec/bsec2@^1.10.2610
  boschsensortec/BME68x Sensor library@^1.3.40408